<div class="section">
    <h2>Scope of Work</h2>

    <div style="display:flex;gap:16px;margin-bottom:16px;">
        <div class="form-group" style="flex:1;">
            <label for="client-name">Funder</label>
            <input type="text" id="client-name" value="{{ proposal.client_name }}"
                   placeholder="Enter funder name..."
                   hx-trigger="keyup changed delay:500ms, change"
                   hx-put="/api/proposal/{{ proposal.id }}"
                   hx-encoding="json"
                   hx-vals='{"client_name": "JS(document.getElementById(\'client-name\').value)"}'>
        </div>
        <div class="form-group" style="flex:1;">
            <label for="proposal-subtitle">Program</label>
            <input type="text" id="proposal-subtitle" value="{{ proposal.subtitle }}"
                   placeholder="Enter program name..."
                   hx-trigger="keyup changed delay:500ms, change"
                   hx-put="/api/proposal/{{ proposal.id }}"
                   hx-encoding="json"
                   hx-vals='{"subtitle": "JS(document.getElementById(\'proposal-subtitle\').value)"}'>
        </div>
    </div>

    <div class="form-group">
        <label for="project-summary">Project Summary</label>
        <textarea id="project-summary" rows="5"
                  placeholder="Describe the project overview, goals, and approach..."
                  hx-trigger="keyup changed delay:1000ms, change"
                  hx-put="/api/proposal/{{ proposal.id }}"
                  hx-encoding="json"
                  hx-vals='{"project_summary": "JS(document.getElementById(\'project-summary\').value)"}'>{{ proposal.project_summary }}</textarea>
    </div>

    <div class="form-group">
        <label for="project-scope">Scope</label>
        <textarea id="project-scope" rows="5"
                  placeholder="Describe the scope of work, deliverables, and boundaries..."
                  hx-trigger="keyup changed delay:1000ms, change"
                  hx-put="/api/proposal/{{ proposal.id }}"
                  hx-encoding="json"
                  hx-vals='{"scope": "JS(document.getElementById(\'project-scope\').value)"}'>{{ proposal.scope }}</textarea>
    </div>

    <div class="form-group">
        <label>Tasks / Deliverables</label>
        <div id="task-list">
            {% for task in tasks %}
            <div class="task-card" data-task-id="{{ task.id }}">
                <div class="task-header">
                    <input type="text" class="task-name-input" value="{{ task.name }}"
                           placeholder="Task name"
                           hx-trigger="keyup changed delay:500ms, change"
                           hx-put="/api/proposal/{{ proposal.id }}"
                           hx-encoding="json"
                           hx-vals='{"tasks": "JS(getUpdatedTasks())"}'>
                    <button class="btn-icon btn-danger-icon"
                            hx-delete="/api/task/{{ proposal.id }}/{{ task.id }}"
                            hx-target="closest .task-card"
                            hx-swap="outerHTML"
                            hx-confirm="Remove this task and its budget items?">&times;</button>
                </div>
                <textarea class="task-desc-input" rows="2"
                          placeholder="Task description..."
                          hx-trigger="keyup changed delay:1000ms, change"
                          hx-put="/api/proposal/{{ proposal.id }}"
                          hx-encoding="json"
                          hx-vals='{"tasks": "JS(getUpdatedTasks())"}'>{{ task.description }}</textarea>
            </div>
            {% endfor %}
        </div>

        <div class="add-task-form" style="flex-direction:column;gap:8px;">
            <div style="display:flex;gap:8px;">
                <input type="text" id="new-task-name" placeholder="New task name..." class="flex-grow">
                <textarea id="new-task-desc" rows="2" placeholder="Task description..." class="flex-grow"
                          style="resize:vertical;"></textarea>
            </div>
            <div>
                <button class="btn btn-primary"
                        onclick="addTask('{{ proposal.id }}')">Add Task</button>
            </div>
        </div>
    </div>
</div>
