<div class="section">
    <h2>Scope of Work</h2>

    <div class="form-group">
        <label for="project-summary">Project Summary</label>
        <textarea id="project-summary" rows="5"
                  placeholder="Describe the project overview, goals, and approach..."
                  hx-trigger="keyup changed delay:1000ms"
                  hx-put="/api/proposal/{{ proposal.id }}"
                  hx-vals='{"project_summary": "JS(document.getElementById(\'project-summary\').value)"}'>{{ proposal.project_summary }}</textarea>
    </div>

    <div class="form-group">
        <label>Tasks / Deliverables</label>
        <div id="task-list">
            {% for task in tasks %}
            <div class="task-card" data-task-id="{{ task.id }}">
                <div class="task-header">
                    <input type="text" class="task-name-input" value="{{ task.name }}"
                           placeholder="Task name"
                           hx-trigger="keyup changed delay:500ms, change"
                           hx-put="/api/proposal/{{ proposal.id }}"
                           hx-vals='{"tasks": "JS(getUpdatedTasks())"}'>
                    <button class="btn-icon btn-danger-icon"
                            hx-delete="/api/task/{{ proposal.id }}/{{ task.id }}"
                            hx-target="closest .task-card"
                            hx-swap="outerHTML"
                            hx-confirm="Remove this task and its budget items?">&times;</button>
                </div>
                <textarea class="task-desc-input" rows="2"
                          placeholder="Task description..."
                          hx-trigger="keyup changed delay:1000ms, change"
                          hx-put="/api/proposal/{{ proposal.id }}"
                          hx-vals='{"tasks": "JS(getUpdatedTasks())"}'>{{ task.description }}</textarea>
            </div>
            {% endfor %}
        </div>

        <div class="add-task-form">
            <input type="text" id="new-task-name" placeholder="New task name..." class="flex-grow">
            <button class="btn btn-primary"
                    onclick="addTask('{{ proposal.id }}')">Add Task</button>
        </div>
    </div>
</div>
