<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Propongo 2{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <aside class="sidebar open" id="snippet-sidebar">
            <div class="sidebar-header">
                <h3>Snippets</h3>
                <button class="btn-icon" onclick="toggleSidebar()" title="Close sidebar">&times;</button>
            </div>
            <div class="sidebar-content" id="snippet-list">
                <div class="snippet-loading">Loading snippets...</div>
            </div>
        </aside>

        <main class="main-content sidebar-open">
            <header class="app-header">
                <div class="header-left">
                    <button class="btn-icon sidebar-toggle-btn" onclick="toggleSidebar()" title="Toggle snippets panel" id="sidebar-toggle">&#10094;</button>
                    <h1>Propongo 2</h1>
                </div>
                <div class="header-center">
                    <input type="text" id="proposal-title" class="title-input"
                           value="{{ proposal.title }}"
                           placeholder="Proposal title..."
                           hx-trigger="keyup changed delay:500ms"
                           hx-put="/api/proposal/{{ proposal.id }}"
                           hx-encoding="json"
                           hx-vals='{"title": "JS(document.getElementById(\'proposal-title\').value)"}'
                           hx-include="[name='client_name']">
                    <input type="hidden" name="client_name" value="{{ proposal.client_name }}">
                </div>
                <div class="header-right">
                    <div class="hamburger-menu">
                        <button class="btn-icon hamburger-btn" onclick="toggleHamburgerMenu()" title="Menu">&#9776;</button>
                        <div class="hamburger-dropdown hidden" id="hamburger-dropdown">
                            <a class="hamburger-item" href="/">Switch Proposal</a>
                            <a class="hamburger-item" href="/new">New Proposal</a>
                            <button class="hamburger-item" onclick="openSaveAsModal(); closeHamburger()">Save As...</button>
                            <hr class="hamburger-divider">
                            <button class="hamburger-item" onclick="exportProposal('{{ proposal.id }}', 'html'); closeHamburger()">Export HTML</button>
                            <button class="hamburger-item" onclick="exportProposal('{{ proposal.id }}', 'pdf'); closeHamburger()">Export PDF</button>
                            <button class="hamburger-item" onclick="window.print(); closeHamburger()">Print</button>
                            <hr class="hamburger-divider">
                            <button class="hamburger-item hamburger-theme-btn" onclick="toggleDarkMode()" id="dark-mode-toggle">
                                <span id="dark-mode-label">Dark Mode: Off</span>
                            </button>
                            <hr class="hamburger-divider">
                            <button class="hamburger-item" onclick="closeHamburger()">Cancel</button>
                        </div>
                    </div>
                </div>
            </header>

            <nav class="tab-nav">
                <button class="tab-btn active" data-tab="scope"
                        onclick="switchTab('{{ proposal.id }}', 'scope', this)">Scope</button>
                <button class="tab-btn" data-tab="budget"
                        onclick="switchTab('{{ proposal.id }}', 'budget', this)">Budget</button>
                <button class="tab-btn" data-tab="qualifications"
                        onclick="switchTab('{{ proposal.id }}', 'qualifications', this)">Qualifications</button>
                <button class="tab-btn" data-tab="timeline"
                        onclick="switchTab('{{ proposal.id }}', 'timeline', this)">Timeline</button>
                <button class="tab-btn" data-tab="preview"
                        onclick="switchTab('{{ proposal.id }}', 'preview', this)">Preview</button>
            </nav>

            <div id="tab-content" class="tab-content">
                {% include "scope.html" %}
            </div>
        </main>
    </div>

    <div id="proposal-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Your Proposals</h2>
                <button class="btn-icon" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="proposal-list-body">
            </div>
            <div class="modal-footer">
                <a href="/new" class="btn btn-primary">New Proposal</a>
            </div>
        </div>
    </div>

    <div id="save-as-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Save As</h2>
                <button class="btn-icon" onclick="closeSaveAsModal()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="save-as-title">Proposal Title</label>
                    <input type="text" id="save-as-title" placeholder="Enter proposal title..." style="width:100%;padding:8px;border:1px solid var(--border);border-radius:4px;font-size:14px;">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeSaveAsModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveProposalAs()">Save</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
    <script src="{{ url_for('static', filename='js/budget.js') }}"></script>
    <script src="{{ url_for('static', filename='js/gantt.js') }}"></script>
    <script src="{{ url_for('static', filename='js/snippets.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
