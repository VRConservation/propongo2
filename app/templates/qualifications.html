<div class="section">
    <h2>Qualifications</h2>

    <div class="form-group">
        <label for="qualifications-text" id="label-qualifications-text" data-word-count="qualifications-text" data-base-label="Company Background & Qualifications">Company Background & Qualifications</label>
        <textarea id="qualifications-text" rows="10"
                  placeholder="Describe your organization's background, relevant experience, team qualifications, and why you're the right choice for this project..."
                  hx-trigger="keyup changed delay:1000ms, change"
                  hx-put="/api/proposal/{{ proposal.id }}"
                  hx-encoding="json"
                  hx-vals='{"qualifications": "JS(document.getElementById(\'qualifications-text\').value)"}'>{{ proposal.qualifications }}</textarea>
    </div>

    <div class="callout callout-info">
        <p><strong>Tip:</strong> Use the snippets panel (&#9776;) to insert pre-written organization descriptions and templates.</p>
    </div>
</div>
